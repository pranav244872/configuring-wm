add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

palette = 'custom'

[palettes.custom]
color1 = '{{colors.primary.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface.default.hex}}'
color4 = '{{colors.primary_fixed_dim.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.on_primary_fixed.default.hex}}'
color7 = '{{colors.primary_fixed_dim.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

[fill]
symbol = '-'
style = 'fg:color3'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:color3)"
error_symbol = "[пҖҚ пҒӢ](bold fg:color9)"

[package]
disabled = true

[git_branch]
style = "bg:color4"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:color4)[$symbol $branch(:$remote_branch)](fg:color6 bg:color4)[оӮҙ](bold fg:color4)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:color4 bold fg:color6)[оӮҙ](bold fg:color4)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:color4 fg:color6"
style_root = "red bold"
format = "[оӮ¶](bold fg:color4)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:color7 fg:color6"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:color7)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:color7)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:color4)[у°Әў $duration](bold bg:color4 fg:color6)[оӮҙ](bold fg:color4)'
