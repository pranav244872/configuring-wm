source = ~/.config/hypr/colors-hyprlock.conf

# ── General ─────────────────────────────────────────────────
general {
    grace = 2
    ignore_empty_input = true
}

animation = fade, 1, 1.8, linear
bezier = linear, 1, 1, 0, 0

# ── Background ──────────────────────────────────────────────
# $image comes from matugen colors-hyprlock.conf (set from awww wallpaper)
background {
    monitor =
    path = $image
    color = $background
    blur_passes = 3
    blur_size = 6
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

# ── Top bar accent line (mimics the waybar bottom border) ───
shape {
    monitor =
    size = 100%, 2
    color = $outline_variant
    position = 0, 0
    halign = center
    valign = top
}

# ── Hours ───────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%H"
    color = $primary
    font_size = 140
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# ── Minutes ─────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = $on_surface
    font_size = 140
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 50
    halign = center
    valign = center
}

# ── Day, Date ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +'%A, %b %d' | tr '[:upper:]' '[:lower:]'
    color = $secondary
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# ── Separator bracket ──────────────────────────────────────
label {
    monitor =
    text = ─────────────────
    color = $outline_variant
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -90
    halign = center
    valign = center
}

# ── User icon + name ───────────────────────────────────────
label {
    monitor =
    text =   $USER
    color = $on_surface_variant
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

# ── Input field ─────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 45
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = $outline_variant
    inner_color = $surface_container
    font_color = $on_surface
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = false
    placeholder_text = <i><span foreground="##cfc5b4">  enter pass</span></i>
    fail_text = <i><span foreground="##ffb4ab">  $FAIL ($ATTEMPTS)</span></i>
    check_color = $primary 120deg
    fail_color = $error 40deg
    capslock_color = $secondary
    hide_input = false
    rounding = 8
    position = 0, -170
    halign = center
    valign = center
}

# ── Caps lock warning ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:200] for f in /sys/class/leds/*capslock*/brightness; do [ "$(cat $f)" = "1" ] && echo "󰪛  caps lock on"; done
    color = $secondary
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -210
    halign = center
    valign = center
}

# ── Battery status (bottom left) ───────────────────────────
label {
    monitor =
    text = cmd[update:5000] cat /sys/class/power_supply/BAT0/capacity 2>/dev/null | xargs -I{} echo "bat {}%"
    color = $on_surface_variant
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = 20, 20
    halign = left
    valign = bottom
}

# ── Network status (bottom left, next to battery) ──────────
label {
    monitor =
    text = cmd[update:5000] nmcli -t -f NAME connection show --active 2>/dev/null | head -1 | xargs -I{} echo "net  {}" || echo "net  off"
    color = $on_surface_variant
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = 110, 20
    halign = left
    valign = bottom
}

# ── Now playing (bottom center) ────────────────────────────
label {
    monitor =
    text = cmd[update:2000] playerctl metadata --format '  {{ artist }} - {{ title }}' 2>/dev/null || echo ""
    color = $outline
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = bottom
}

# ── Power buttons (bottom right) ───────────────────────────
# Shutdown
label {
    monitor =
    text = 󰐥
    color = $on_surface_variant
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    onclick = shutdown now
    position = -30, 25
    halign = right
    valign = bottom
}

# Reboot
label {
    monitor =
    text = 󰜉
    color = $on_surface_variant
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    onclick = reboot now
    position = -70, 25
    halign = right
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄
    color = $on_surface_variant
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    onclick = systemctl suspend
    position = -110, 25
    halign = right
    valign = bottom
}
