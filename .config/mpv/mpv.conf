# ==========    GENERAL    ==========

profile=high-quality
vo=gpu-next
gpu-api=opengl
fullscreen=no
force-seekable=yes
keep-open=always
reset-on-next-file=pause
hwdec=auto
dither-depth=8
scale-antiring=0.6

# ==========    SCALERS    ==========

scale=ewa_lanczossharp
dscale=mitchell
cscale=ewa_lanczossharp

# ==========    DEBANDING    ==========

deband=no
deband-iterations=2
deband-threshold=64
deband-range=17
deband-grain=12

# ==========    OSD / OSC    ==========

osd-bar=no
osc=no
border=no
cursor-autohide-fs-only=yes
cursor-autohide=300
osd-level=1
osd-duration=1000
hr-seek=yes

osd-font='Verdana'
osd-font-size=20
osd-color='#FFFFFF'
osd-border-color='#000000'
osd-border-size=0.6
osd-blur=0.2

# ==========    LANGUAGE    ==========

alang=ja,jp,jpn,en,eng
slang=en,eng

# ==========    AUDIO    ==========

volume=100
audio-file-auto=fuzzy
volume-max=200
audio-pitch-correction=yes

# ==========    SUBTITLES    ==========

demuxer-mkv-subtitle-preroll=yes
sub-fix-timing=no
sub-auto=all

sub-font='Netflix Sans'
sub-font-size=40
sub-color='#FFFFFFFF'
sub-border-color='#FF000000'
sub-border-size=2.0
sub-shadow-color="#A0000000"
sub-shadow-offset=0.75
sub-spacing=0.0
sub-bold=yes

# ==========    SCREENSHOT    ==========

screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-png-compression=1
screenshot-directory="~/Pictures/mpv-screenshots"
screenshot-template="%f-%wH.%wM.%wS.%wT-#%#00n"

# ==========    AUTO PROFILES    ==========

[WEB-DL]
profile-desc=WEB-DL Anime (HatSubs, SubsPlease, HorribleSubs, Erai-raws)
profile-cond=string.match(p.filename, "HatSubs")~=nil or string.match(p.filename, "SubsPlease")~=nil or string.match(p.filename, "HorribleSubs")~=nil or string.match(p.filename, "Erai%-raws")~=nil
deband=yes
